version: "3"
services:
  duplicati:
    image: lscr.io/linuxserver/duplicati:2.0.8
    container_name: ${CONTAINER_NAME:-duplicati}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8200}:8200"
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      CLI_ARGS: ${CLI_ARGS:-}
    volumes:
      - duplicati_config:/config
      - duplicati_backups:/backups
      - duplicati_source:/source
    healthcheck:
      test: ["CMD-SHELL", "test -d /config || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  duplicati_config:
  duplicati_backups:
  duplicati_source:

networks:
  tinohost-network:
    external: true
