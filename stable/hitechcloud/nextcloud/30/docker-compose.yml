version: "3"
services:
  nextcloud:
    image: nextcloud:30-apache
    container_name: ${CONTAINER_NAME:-nextcloud}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8084}:80"
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-admin123}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-localhost}
      SQLITE_DATABASE: ${SQLITE_DATABASE:-nextcloud.db}
    volumes:
      - nextcloud_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  nextcloud_data:

networks:
  tinohost-network:
    external: true
