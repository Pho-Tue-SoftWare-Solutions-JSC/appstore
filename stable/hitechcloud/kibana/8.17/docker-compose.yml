version: "3"
services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: ${CONTAINER_NAME:-kibana}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5601}:5601"
    environment:
      ELASTICSEARCH_HOSTS: ${ELASTICSEARCH_HOSTS:-http://elasticsearch:9200}
      SERVER_PUBLICBASEURL: ${SERVER_PUBLICBASEURL:-http://localhost:5601}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5601 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
