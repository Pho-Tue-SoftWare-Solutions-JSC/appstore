version: "3"
services:
  metabase:
    image: metabase/metabase:v0.53.7
    container_name: ${CONTAINER_NAME:-metabase}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3030}:3000"
    environment:
      MB_DB_FILE: ${MB_DB_FILE:-/metabase-data/metabase.db}
      MB_SITE_URL: ${MB_SITE_URL:-http://localhost:3030}
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD-SHELL", "java -version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  metabase_data:

networks:
  tinohost-network:
    external: true
