version: "3"
services:
  prestashop:
    image: prestashop/prestashop:8.2-apache
    container_name: ${CONTAINER_NAME:-prestashop}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8086}:80"
    environment:
      DB_SERVER: ${DB_SERVER:-mysql}
      DB_NAME: ${DB_NAME:-prestashop}
      DB_USER: ${DB_USER:-prestashop}
      DB_PASSWD: ${DB_PASSWD:-prestashop}
      PS_DOMAIN: ${PS_DOMAIN:-localhost:8086}
      PS_INSTALL_AUTO: ${PS_INSTALL_AUTO:-1}
      PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN:-admin-dev}
    volumes:
      - prestashop_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  prestashop_data:

networks:
  tinohost-network:
    external: true
