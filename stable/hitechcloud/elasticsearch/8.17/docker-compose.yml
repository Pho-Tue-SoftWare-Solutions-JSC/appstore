version: "3"
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: ${CONTAINER_NAME:-elasticsearch}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-9200}:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: ${XPACK_SECURITY_ENABLED:-false}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9200 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - tinohost-network

volumes:
  elasticsearch_data:

networks:
  tinohost-network:
    external: true
