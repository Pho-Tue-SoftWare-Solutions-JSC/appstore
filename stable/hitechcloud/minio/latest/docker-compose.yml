version: "3"
services:
  minio:
    image: minio/minio:latest
    container_name: ${CONTAINER_NAME:-minio}
    restart: unless-stopped
    ports:
      - "${API_PORT:-9000}:9000"
      - "${CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadminpassword}
      MINIO_BROWSER_REDIRECT_URL: ${CONSOLE_URL:-}
      MINIO_SERVER_URL: ${SERVER_URL:-}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

volumes:
  minio_data:

networks:
  tinohost-network:
    external: true
