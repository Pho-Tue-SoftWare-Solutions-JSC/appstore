version: "3"
services:
  airbyte:
    image: airbyte/webapp:1.5.1
    container_name: ${CONTAINER_NAME:-airbyte}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8010}:80"
    environment:
      AIRBYTE_ROLE: ${AIRBYTE_ROLE:-}
      TRACKING_STRATEGY: ${TRACKING_STRATEGY:-logging}
    healthcheck:
      test: ["CMD-SHELL", "test -d /airbyte || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
