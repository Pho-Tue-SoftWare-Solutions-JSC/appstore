version: "3"
services:
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: ${CONTAINER_NAME:-pgadmin}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE:-False}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ["CMD-SHELL", "python --version >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  pgadmin_data:

networks:
  tinohost-network:
    external: true
