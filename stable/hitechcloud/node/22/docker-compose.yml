version: "3"
services:
  node:
    image: node:22-alpine
    container_name: ${CONTAINER_NAME:-node}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_PORT:-3000}
    volumes:
      - node_app:/app
    command: ${NODE_COMMAND:-node index.js}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:${APP_PORT:-3000}/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

volumes:
  node_app:

networks:
  tinohost-network:
    external: true
