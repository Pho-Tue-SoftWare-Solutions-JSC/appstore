version: "3"
services:
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: ${CONTAINER_NAME:-meilisearch}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey123}
      MEILI_ENV: ${MEILI_ENV:-production}
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  meili_data:

networks:
  tinohost-network:
    external: true
