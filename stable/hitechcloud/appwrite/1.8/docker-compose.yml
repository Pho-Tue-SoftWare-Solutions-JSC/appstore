version: "3"
services:
  appwrite:
    image: appwrite/appwrite:1.8.0
    container_name: ${CONTAINER_NAME:-appwrite}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8089}:80"
    environment:
      _APP_ENV: ${_APP_ENV:-production}
      _APP_OPENSSL_KEY_V1: ${_APP_OPENSSL_KEY_V1:-appwrite-key-change-me}
      _APP_DOMAIN: ${_APP_DOMAIN:-localhost}
      _APP_WORKER_PER_CORE: ${_APP_WORKER_PER_CORE:-2}
      _APP_DB_HOST: ${_APP_DB_HOST:-mariadb}
      _APP_DB_USER: ${_APP_DB_USER:-appwrite}
      _APP_DB_PASS: ${_APP_DB_PASS:-appwrite}
      _APP_DB_SCHEMA: ${_APP_DB_SCHEMA:-appwrite}
    volumes:
      - appwrite_data:/storage/uploads
    healthcheck:
      test: ["CMD-SHELL", "test -d /storage/uploads || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  appwrite_data:

networks:
  tinohost-network:
    external: true
