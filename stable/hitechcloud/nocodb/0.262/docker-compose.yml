version: "3"
services:
  nocodb:
    image: nocodb/nocodb:0.262.4
    container_name: ${CONTAINER_NAME:-nocodb}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8086}:8080"
    environment:
      NC_DB: ${NC_DB:-sqlite3://db.sqlite3}
      NC_AUTH_JWT_SECRET: ${NC_AUTH_JWT_SECRET:-nocodb-secret}
    volumes:
      - nocodb_data:/usr/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  nocodb_data:

networks:
  tinohost-network:
    external: true
