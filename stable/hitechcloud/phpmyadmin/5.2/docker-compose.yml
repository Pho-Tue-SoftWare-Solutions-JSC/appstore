version: "3"
services:
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: ${CONTAINER_NAME:-phpmyadmin}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8081}:80"
    environment:
      PMA_HOST: ${PMA_HOST:-mysql}
      PMA_PORT: ${PMA_PORT:-3306}
      PMA_ARBITRARY: ${PMA_ARBITRARY:-1}
      UPLOAD_LIMIT: ${UPLOAD_LIMIT:-512M}
      MEMORY_LIMIT: ${MEMORY_LIMIT:-512M}
      MAX_EXECUTION_TIME: ${MAX_EXECUTION_TIME:-600}
    volumes:
      - phpmyadmin_sessions:/sessions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

volumes:
  phpmyadmin_sessions:

networks:
  tinohost-network:
    external: true
