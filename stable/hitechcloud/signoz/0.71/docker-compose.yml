version: "3"
services:
  signoz:
    image: signoz/signoz:0.71.0
    container_name: ${CONTAINER_NAME:-signoz}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8083}:8080"
    volumes:
      - signoz_data:/var/lib/signoz
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/lib/signoz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

volumes:
  signoz_data:

networks:
  tinohost-network:
    external: true
