version: "3"
services:
  calcom:
    image: calcom/cal.com:v5.4.12
    container_name: ${CONTAINER_NAME:-calcom}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3003}:3000"
    environment:
      NEXT_PUBLIC_WEBAPP_URL: ${NEXT_PUBLIC_WEBAPP_URL:-http://localhost:3003}
      DATABASE_URL: ${DATABASE_URL:-postgresql://calcom:calcom@postgresql:5432/calcom}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-calcom-secret}
      CALENDSO_ENCRYPTION_KEY: ${CALENDSO_ENCRYPTION_KEY:-calcom-encryption-key-32-char}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
