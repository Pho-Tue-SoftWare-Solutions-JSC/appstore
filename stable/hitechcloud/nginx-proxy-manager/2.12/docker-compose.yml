version: "3"
services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.12.1
    container_name: ${CONTAINER_NAME:-nginx-proxy-manager}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${ADMIN_PORT:-81}:81"
    environment:
      DB_SQLITE_FILE: /data/database.sqlite
      DISABLE_IPV6: ${DISABLE_IPV6:-false}
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  npm_data:
  npm_letsencrypt:

networks:
  tinohost-network:
    external: true
