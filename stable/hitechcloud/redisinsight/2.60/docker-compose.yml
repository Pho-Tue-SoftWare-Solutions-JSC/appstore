version: "3"
services:
  redisinsight:
    image: redis/redisinsight:2.60
    container_name: ${CONTAINER_NAME:-redisinsight}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-5540}:5540"
    volumes:
      - redisinsight_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  redisinsight_data:

networks:
  tinohost-network:
    external: true
