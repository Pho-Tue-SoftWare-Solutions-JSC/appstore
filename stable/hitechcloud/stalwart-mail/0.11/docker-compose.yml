version: "3"
services:
  stalwart-mail:
    image: stalwartlabs/mail-server:v0.11.5
    container_name: ${CONTAINER_NAME:-stalwart-mail}
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${SMTPS_PORT:-465}:465"
      - "${SUBMISSION_PORT:-587}:587"
      - "${WEB_PORT:-8089}:8080"
    volumes:
      - stalwart_data:/opt/stalwart-mail
    healthcheck:
      test: ["CMD-SHELL", "test -d /opt/stalwart-mail || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  stalwart_data:

networks:
  tinohost-network:
    external: true
