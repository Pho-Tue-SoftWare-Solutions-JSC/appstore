version: "3"
services:
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: ${CONTAINER_NAME:-mailpit}
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${HTTP_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: ${MP_SMTP_AUTH_ACCEPT_ANY:-1}
      MP_SMTP_AUTH_ALLOW_INSECURE: ${MP_SMTP_AUTH_ALLOW_INSECURE:-1}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8025 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
