version: "3"
services:
  uptime-kuma-agent:
    image: louislam/uptime-kuma:1.23.16
    container_name: ${CONTAINER_NAME:-uptime-kuma-agent}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3009}:3001"
    volumes:
      - uptime_kuma_agent_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /app/data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  uptime_kuma_agent_data:

networks:
  tinohost-network:
    external: true
