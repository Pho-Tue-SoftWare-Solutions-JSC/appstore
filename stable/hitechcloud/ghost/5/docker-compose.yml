version: "3"
services:
  ghost:
    image: ghost:5-alpine
    container_name: ${CONTAINER_NAME:-ghost}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-2368}:2368"
    environment:
      url: ${APP_URL:-http://localhost:2368}
      database__client: ${DB_CLIENT:-sqlite3}
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ghost_content:/var/lib/ghost/content
    healthcheck:
      test: ["CMD-SHELL", "node --version >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  ghost_content:

networks:
  tinohost-network:
    external: true
