version: "3"
services:
  harbor:
    image: goharbor/harbor-core:v2.12.1
    container_name: ${CONTAINER_NAME:-harbor-core}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8089}:8080"
    environment:
      CORE_SECRET: ${CORE_SECRET:-harbor-core-secret}
      JOBSERVICE_SECRET: ${JOBSERVICE_SECRET:-harbor-job-secret}
    volumes:
      - harbor_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  harbor_data:

networks:
  tinohost-network:
    external: true
