version: "3"
services:
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.66.5
    container_name: ${CONTAINER_NAME:-zitadel}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8088}:8080"
    environment:
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8080}
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE:-false}
      ZITADEL_TLS_ENABLED: ${ZITADEL_TLS_ENABLED:-false}
    command: start-from-init --masterkey "${MASTERKEY:-MasterkeyNeedsToHave32Characters}"
    volumes:
      - zitadel_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

volumes:
  zitadel_data:

networks:
  tinohost-network:
    external: true
