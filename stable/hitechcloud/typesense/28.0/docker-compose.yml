version: "3"
services:
  typesense:
    image: typesense/typesense:28.0
    container_name: ${CONTAINER_NAME:-typesense}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8108}:8108"
    environment:
      TYPESENSE_DATA_DIR: ${TYPESENSE_DATA_DIR:-/data}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-typesense-api-key}
      TYPESENSE_ENABLE_CORS: ${TYPESENSE_ENABLE_CORS:-true}
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=${TYPESENSE_API_KEY:-typesense-api-key} --enable-cors'
    healthcheck:
      test: ["CMD-SHELL", "typesense-server --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

volumes:
  typesense_data:

networks:
  tinohost-network:
    external: true
