version: "3"
services:
  kong:
    image: kong:3.9
    container_name: ${CONTAINER_NAME:-kong}
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8000}:8000"
      - "${PROXY_SSL_PORT:-8444}:8443"
      - "${ADMIN_PORT:-8001}:8001"
      - "${ADMIN_SSL_PORT:-8445}:8444"
    environment:
      KONG_DATABASE: ${KONG_DATABASE:-off}
      KONG_DECLARATIVE_CONFIG: ${KONG_DECLARATIVE_CONFIG:-/kong/declarative/kong.yml}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - kong_data:/kong/declarative
    healthcheck:
      test: ["CMD-SHELL", "kong version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  kong_data:

networks:
  tinohost-network:
    external: true
