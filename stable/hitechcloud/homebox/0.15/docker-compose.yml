version: "3"
services:
  homebox:
    image: ghcr.io/hay-kot/homebox:v0.15.0
    container_name: ${CONTAINER_NAME:-homebox}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3100}:7745"
    environment:
      HBOX_MODE: ${HBOX_MODE:-production}
      HBOX_OPTIONS_ALLOW_REGISTRATION: ${HBOX_OPTIONS_ALLOW_REGISTRATION:-false}
    volumes:
      - homebox_data:/data
    healthcheck:
      test: ["CMD-SHELL", "test -d /data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  homebox_data:

networks:
  tinohost-network:
    external: true
