version: "3"
services:
  mattermost:
    image: mattermost/mattermost-team-edition:10.5
    container_name: ${CONTAINER_NAME:-mattermost}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8065}:8065"
    environment:
      MM_SERVICESETTINGS_SITEURL: ${MM_SERVICESETTINGS_SITEURL:-http://localhost:8065}
      MM_SQLSETTINGS_DRIVERNAME: ${MM_SQLSETTINGS_DRIVERNAME:-postgres}
      MM_SQLSETTINGS_DATASOURCE: ${MM_SQLSETTINGS_DATASOURCE:-postgres://mattermost:mattermost@postgresql:5432/mattermost?sslmode=disable&connect_timeout=10}
    volumes:
      - mattermost_config:/mattermost/config
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
      - mattermost_bleve_indexes:/mattermost/bleve-indexes
    healthcheck:
      test: ["CMD-SHELL", "test -d /mattermost/data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

volumes:
  mattermost_config:
  mattermost_data:
  mattermost_logs:
  mattermost_plugins:
  mattermost_client_plugins:
  mattermost_bleve_indexes:

networks:
  tinohost-network:
    external: true
