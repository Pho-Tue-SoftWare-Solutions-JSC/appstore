version: "3"
services:
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:7.5.1
    container_name: ${CONTAINER_NAME:-rocketchat}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3008}:3000"
    environment:
      ROOT_URL: ${ROOT_URL:-http://localhost:3008}
      MONGO_URL: ${MONGO_URL:-mongodb://mongodb:27017/rocketchat}
      MONGO_OPLOG_URL: ${MONGO_OPLOG_URL:-mongodb://mongodb:27017/local}
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/info || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
