version: "3"
services:
  gitea:
    image: gitea/gitea:1.22
    container_name: ${CONTAINER_NAME:-gitea}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-3000}:3000"
      - "${SSH_PORT:-2222}:22"
    environment:
      USER_UID: ${USER_UID:-1000}
      USER_GID: ${USER_GID:-1000}
      GITEA__database__DB_TYPE: ${DB_TYPE:-sqlite3}
      GITEA__database__HOST: ${DB_HOST:-mysql:3306}
      GITEA__database__NAME: ${DB_NAME:-gitea}
      GITEA__database__USER: ${DB_USER:-gitea}
      GITEA__database__PASSWD: ${DB_PASSWORD:-gitea}
      GITEA__server__ROOT_URL: ${ROOT_URL:-http://localhost:3000}
      GITEA__server__DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  gitea_data:

networks:
  tinohost-network:
    external: true
