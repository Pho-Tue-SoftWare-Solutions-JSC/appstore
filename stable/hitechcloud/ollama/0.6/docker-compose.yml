version: "3"
services:
  ollama:
    image: ollama/ollama:0.6.2
    container_name: ${CONTAINER_NAME:-ollama}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-11434}:11434"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-0.0.0.0}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  ollama_data:

networks:
  tinohost-network:
    external: true
