version: "3"
services:
  directus:
    image: directus/directus:11.4.0
    container_name: ${CONTAINER_NAME:-directus}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8055}:8055"
    environment:
      SECRET: ${SECRET:-change-me-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DB_CLIENT: ${DB_CLIENT:-sqlite3}
      WEBSOCKETS_ENABLED: ${WEBSOCKETS_ENABLED:-true}
    volumes:
      - directus_data:/directus/database
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8055/server/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - tinohost-network

volumes:
  directus_data:
  directus_uploads:
  directus_extensions:

networks:
  tinohost-network:
    external: true
