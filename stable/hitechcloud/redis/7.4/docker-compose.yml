version: "3"
services:
  redis:
    image: redis:7.4-alpine
    container_name: ${CONTAINER_NAME:-redis}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --maxmemory ${REDIS_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tinohost-network

volumes:
  redis_data:

networks:
  tinohost-network:
    external: true
