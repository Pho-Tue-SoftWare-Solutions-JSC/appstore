version: "3"
services:
  memcached:
    image: memcached:1.6-alpine
    container_name: ${CONTAINER_NAME:-memcached}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-11211}:11211"
    command: memcached -m ${MEMORY_LIMIT:-64} -c ${MAX_CONNECTIONS:-1024}
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc localhost 11211 | grep pid"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
