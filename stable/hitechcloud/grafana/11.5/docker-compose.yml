version: "3"
services:
  grafana:
    image: grafana/grafana:11.5.2
    container_name: ${CONTAINER_NAME:-grafana}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:3002}
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/grafana/bin/grafana || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - tinohost-network

volumes:
  grafana_data:

networks:
  tinohost-network:
    external: true
