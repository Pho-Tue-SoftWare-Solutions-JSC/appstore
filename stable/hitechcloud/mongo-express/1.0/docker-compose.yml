version: "3"
services:
  mongo-express:
    image: mongo-express:1.0.2
    container_name: ${CONTAINER_NAME:-mongo-express}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: ${ME_CONFIG_MONGODB_SERVER:-mongodb}
      ME_CONFIG_MONGODB_PORT: ${ME_CONFIG_MONGODB_PORT:-27017}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD:-example}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
