version: "3"
services:
  mongodb:
    image: mongo:8.0
    container_name: ${CONTAINER_NAME:-mongodb}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongopassword}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-default}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  mongo_data:
  mongo_config:

networks:
  tinohost-network:
    external: true
