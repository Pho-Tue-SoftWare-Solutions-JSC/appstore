version: "3"
services:
  langfuse:
    image: langfuse/langfuse:2.95.1
    container_name: ${CONTAINER_NAME:-langfuse}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3007}:3000"
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-langfuse-secret}
      SALT: ${SALT:-langfuse-salt}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
    volumes:
      - langfuse_data:/app/.next/cache
    healthcheck:
      test: ["CMD-SHELL", "node --version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - tinohost-network

volumes:
  langfuse_data:

networks:
  tinohost-network:
    external: true
