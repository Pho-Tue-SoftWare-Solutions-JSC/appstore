version: "3"
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1.3
    container_name: ${CONTAINER_NAME:-keycloak}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8087}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin123}
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "test -f /opt/keycloak/bin/kc.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

networks:
  tinohost-network:
    external: true
