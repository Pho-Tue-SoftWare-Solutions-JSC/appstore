version: "3"
services:
  posthog:
    image: posthog/posthog:1.149.0
    container_name: ${CONTAINER_NAME:-posthog}
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8002}:8000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-posthog-secret-key}
      DATABASE_URL: ${DATABASE_URL:-postgres://posthog:posthog@postgresql:5432/posthog}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_SECURE_SSL_REDIRECT: ${DISABLE_SECURE_SSL_REDIRECT:-true}
    volumes:
      - posthog_data:/var/lib/posthog
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/lib/posthog || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tinohost-network

volumes:
  posthog_data:

networks:
  tinohost-network:
    external: true
