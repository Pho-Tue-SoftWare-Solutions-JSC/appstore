version: "3"
services:
  caddy:
    image: caddy:2.9.1
    container_name: ${CONTAINER_NAME:-caddy}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8085}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "caddy version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tinohost-network

volumes:
  caddy_data:
  caddy_config:

networks:
  tinohost-network:
    external: true
